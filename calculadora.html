<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>JUANF | ELITE PERFORMANCE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Bebas+Neue&family=Lexend+Deca:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        :root { --ebano: #050505; --nogal: #322419; --oro: #c5a059; --texto: #f0e6d2; }
        body { background: var(--ebano); font-family: 'Lexend Deca', sans-serif; color: var(--texto); margin: 0; overflow-x: hidden; }

        .bg-visuals {
            position: fixed; right: 0; top: 0; width: 70%; height: 100vh;
            display: flex; align-items: center; justify-content: center; z-index: 1;
            background: radial-gradient(circle at 70% 50%, #1a1410 0%, #050505 100%);
        }
        .bg-text { font-family: 'Syncopate'; font-size: 10vw; color: rgba(255, 255, 255, 0.02); text-transform: uppercase; pointer-events: none; }

        .sidebar { 
            position: relative; width: 500px; background: rgba(0, 0, 0, 0.95); 
            padding: 4rem 3.5rem; border-right: 1px solid var(--nogal); 
            min-height: 100vh; z-index: 10; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }

        .card-nogal { background: linear-gradient(160deg, #251a12, #0d0906); padding: 2rem; border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 4px; }
        .label-pro { font-family: 'Syncopate'; font-size: 0.8rem; color: var(--oro); letter-spacing: 3px; display: block; margin-bottom: 10px; margin-top: 15px; }
        
        #contenedor-metodo { display: none; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        input, select { 
            background: #111 !important; 
            border: 1px solid #333 !important; 
            color: #fff !important; 
            padding: 15px !important; 
            margin-bottom: 12px; 
            border-radius: 0 !important; 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 1.2rem; 
            letter-spacing: 1px;
        }
        input:focus, select:focus { border-color: var(--oro) !important; outline: none; }

        .btn-premium { background: var(--oro); color: #000; border: none; padding: 20px; font-family: 'Syncopate'; font-size: 0.7rem; width: 100%; font-weight: 700; letter-spacing: 2px; transition: 0.4s; cursor: pointer; }
        #pagina-resultados { display: none; position: relative; z-index: 100; background: var(--ebano); min-height: 100vh; padding: 5rem; }

        /* AJUSTE RESPONSIVE AGREGADO */
        @media (max-width: 768px) {
            .sidebar { width: 100%; padding: 2rem 1.5rem; }
            .bg-visuals { display: none; }
            #pagina-resultados { padding: 2rem 1rem; }
            #res-objetivo { font-size: 2.5rem !important; }
        }
    </style>
</head>
<body>

<div id="home-calculadora" class="d-flex">
    <aside class="sidebar">
        <h1 class="mb-5" style="font-family:'Syncopate'; font-size: 2.8rem;">JUAN<span style="color:var(--oro)">F</span></h1>
        
        <div class="card-nogal mb-4">
            <span class="label-pro">ACCESO</span>
            <input type="email" id="email" class="form-control mt-2" placeholder="CORREO@EJEMPLO.COM">
            <button class="btn-premium" onclick="crearBotonPago()">PAGAR PROTOCOLO ($1000)</button>
            <div id="wallet_container" class="mt-2"></div>
        </div>

        <span class="label-pro">DATOS ATLETA</span>
        <div class="row g-2">
            <div class="col-6"><input type="number" id="peso" class="form-control" placeholder="KG"></div>
            <div class="col-6"><input type="number" id="altura" class="form-control" placeholder="CM"></div>
        </div>
        <input type="number" id="edad" class="form-control" placeholder="EDAD">
        
        <span class="label-pro">OBJETIVO PRINCIPAL</span>
        <select id="objetivo" class="form-select mb-2" onchange="actualizarMetodos()">
            <option value="" selected disabled>SELECCIONAR OBJETIVO...</option>
            <option value="volumen">VOLUMEN MÁXIMO</option>
            <option value="definicion">DEFINICIÓN ELITE</option>
            <option value="mantenimiento">MANTENIMIENTO / RECOMPOSICIÓN</option>
        </select>

        <div id="contenedor-metodo">
            <span class="label-pro">SISTEMA DE ENTRENAMIENTO</span>
            <select id="metodo-entrenamiento" class="form-select mb-4"></select>
        </div>

        <span class="label-pro">ACTIVIDAD & CARDIO</span>
        <select id="actividad" class="form-select mb-4">
            <option value="1.375">GYM 3 DÍAS (BÁSICO)</option>
            <option value="1.55">GYM 3-5 DÍAS + CARDIO LISS (SALUD)</option>
            <option value="1.725">GYM 5 DÍAS + HIIT (RENDIMIENTO)</option>
            <option value="1.9">ATLETA PRO / DOBLE SESIÓN</option>
        </select>

        <button class="btn-premium" id="btnCalcular" onclick="obtenerResultados()" disabled 
                style="background: #111; color: #444; border: 1px solid #222;">
            PAGO REQUERIDO 🔒
        </button>
    </aside>

    <section class="bg-visuals">
        <div class="bg-text">JUANF<br>ELITE</div>
    </section>
</div>

<div id="pagina-resultados" class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-11">
            <h2 id="res-objetivo" style="font-size: 4rem; color: var(--oro); font-family:'Bebas Neue';"></h2>
            <div class="row g-4 mt-2">
                <div class="col-md-3"><div class="card-nogal text-center"><span class="label-pro">CALORÍAS</span><div style="font-size:3rem; color:var(--oro); font-family:'Bebas Neue';" id="res-cal"></div></div></div>
                <div class="col-md-3"><div class="card-nogal text-center"><span class="label-pro">PROTEÍNA</span><div style="font-size:3rem; color:var(--oro); font-family:'Bebas Neue';" id="res-prot"></div><small id="rango-p"></small></div></div>
                <div class="col-md-3"><div class="card-nogal text-center"><span class="label-pro">CARBOS</span><div style="font-size:3rem; color:var(--oro); font-family:'Bebas Neue';" id="res-carbo"></div><small id="rango-c"></small></div></div>
                <div class="col-md-3"><div class="card-nogal text-center"><span class="label-pro">GRASAS</span><div style="font-size:3rem; color:var(--oro); font-family:'Bebas Neue';" id="res-grasa"></div></div></div>
            </div>

            <div class="row mt-5">
                <div class="col-md-4">
                    <div class="card-nogal">
                        <span class="label-pro">LIMITES OMS</span>
                        <p class="mt-2">SATURADAS: <span id="res-sat"></span>g | AZÚCAR: <span id="res-azucar"></span>g | SAL: <span id="res-sal"></span>g</p>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card-nogal">
                        <span class="label-pro">MÉTODO SELECCIONADO</span>
                        <h3 id="nombre-sistema" class="text-white mt-2" style="font-family:'Bebas Neue';"></h3>
                        <a id="link-entrenamiento" target="_blank" class="btn-premium d-inline-block mt-3 text-decoration-none" style="width:auto; padding: 10px 30px;">ACCEDER A VIDEOS TÉCNICOS</a>
                    </div>
                </div>
            </div>
            <button class="btn btn-outline-secondary mt-5" onclick="location.reload()">VOLVER</button>
        </div>
    </div>
</div>

<script>
    const mp = new MercadoPago('APP_USR-d66ee708-49ac-4b76-a69b-6716032f77b6', { locale: 'es-AR' });

    function actualizarMetodos() {
        const objetivo = document.getElementById('objetivo').value;
        const contenedor = document.getElementById('contenedor-metodo');
        const listaMetodos = document.getElementById('metodo-entrenamiento');
        listaMetodos.innerHTML = "";
        contenedor.style.display = "block";

        const opciones = {
            "volumen": [
                { val: "ppl", text: "PUSH/PULL/LEGS (HIPERTROFIA PRO)" },
                { val: "bro", text: "BRO SPLIT (VOLUMEN LOCALIZADO)" },
                { val: "heavy", text: "HEAVY DUTY (ALTA INTENSIDAD)" }
            ],
            "definicion": [
                { val: "densidad", text: "DENSIDAD METABÓLICA (FST-7)" },
                { val: "fuerza", text: "FUERZA CONSERVADA (BAJO VOLUMEN)" },
                { val: "circuito", text: "CIRCUITOS DE POTENCIA" }
            ],
            "mantenimiento": [
                { val: "ul", text: "UPPER/LOWER (ESTÉTICA GENERAL)" },
                { val: "fb", text: "FULL BODY (RENDIMIENTO)" },
                { val: "recomp", text: "RECOMPOSICIÓN CORPORAL 50/50" }
            ]
        };

        opciones[objetivo].forEach(opc => {
            let nOpc = document.createElement('option');
            nOpc.value = opc.val;
            nOpc.text = opc.text;
            listaMetodos.appendChild(nOpc);
        });
    }

   // Busca esta parte en tu script de la calculadora.html
async function crearBotonPago() {
    const email = document.getElementById('email').value;
    
    // Cambiamos el fetch para que use la ruta completa
    const response = await fetch('http://192.168.100.7:5001/crear_preferencia', { 
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ email: email }) 
    });
    
    const pref = await response.json();
    
    mp.bricks().create("wallet", "wallet_container", {
        initialization: { preferenceId: pref.id },
        callbacks: {
            onReady: () => {
                console.log("Brick de MP listo");
            },
            onSubmit: () => {
                // ESTO ES LO QUE DESBLOQUEA TU APP
                fetch('http://192.168.100.7:5001/confirmar_pago_manual', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ email: email }) 
                });

                const btn = document.getElementById('btnCalcular');
                btn.disabled = false; 
                btn.innerText = "ACCEDER ✅"; 
                btn.style.color = "var(--oro)";
                btn.style.background = "#000";
            }
        }
    });
}

    async function obtenerResultados() {
        const payload = {
            email: document.getElementById('email').value,
            peso: document.getElementById('peso').value, altura: document.getElementById('altura').value,
            edad: document.getElementById('edad').value, actividad: document.getElementById('actividad').value,
            objetivo: document.getElementById('objetivo').value, patologia: "no"
        };

        const response = await fetch('/obtener_resultados', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        const res = await response.json();

        if(response.ok) {
            document.getElementById('home-calculadora').style.display = 'none';
            document.getElementById('pagina-resultados').style.display = 'block';
            document.getElementById('res-objetivo').innerText = res.objetivo;
            document.getElementById('res-cal').innerText = res.calorias;
            document.getElementById('res-prot').innerText = Math.round((res.prot_min + res.prot_max)/2) + "g";
            document.getElementById('rango-p').innerText = res.prot_min + " - " + res.prot_max + "g";
            document.getElementById('res-carbo').innerText = Math.round((res.carb_min + res.carb_max)/2) + "g";
            document.getElementById('rango-c').innerText = res.carb_min + " - " + res.carb_max + "g";
            document.getElementById('res-grasa').innerText = res.grasas + "g";
            document.getElementById('res-sat').innerText = res.grasa_sat_max;
            document.getElementById('res-azucar').innerText = res.azucar_max;
            document.getElementById('res-sal').innerText = res.sal_max;
            const combo2 = document.getElementById('metodo-entrenamiento');
            document.getElementById('nombre-sistema').innerText = combo2.options[combo2.selectedIndex].text;
            document.getElementById('link-entrenamiento').href = "https://www.youtube.com/results?search_query=" + combo2.options[combo2.selectedIndex].text;
        }
    }
</script>
</body>
</html>
